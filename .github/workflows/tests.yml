name: Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-tests:
    name: Rust unit & mock tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run Rust tests
        run: cargo test

  integration-tests:
    name: Integration tests (LocalStack + pytest)
    runs-on: ubuntu-latest
    needs: rust-tests

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build debug binary
        run: cargo build

      - name: Start LocalStack
        run: docker compose up -d localstack --wait

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r tests/pytest/requirements.txt

      - name: Run integration tests
        run: pytest tests/pytest/ -v --tb=short
        env:
          LOCALSTACK_ENDPOINT: http://localhost:4566

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
