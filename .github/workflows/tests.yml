name: Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-tests:
    name: Rust unit & mock tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run Rust tests
        run: cargo test

  integration-tests:
    name: Integration tests (Docker Compose + pytest)
    runs-on: ubuntu-latest
    needs: rust-tests

    steps:
      - uses: actions/checkout@v4

      - name: Create shared data directory
        run: mkdir -p .data

      - name: Start all services
        run: docker compose up -d --build --wait
        timeout-minutes: 10

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r tests/pytest/requirements.txt

      - name: Run integration tests
        run: pytest tests/pytest/ -v --tb=short
        env:
          PROXY_URL: http://localhost:8888
          LOCALSTACK_ENDPOINT: http://localhost:4566
          ELASTICSEARCH_URL: http://localhost:9200
          TEST_SERVER_BIND_HOST: "0.0.0.0"
          TEST_SERVER_HOST: host.docker.internal

      - name: Dump xs3lerator logs on failure
        if: failure()
        run: docker compose logs xs3lerator --no-color --tail=500

      - name: Dump all service logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down
        if: always()
        run: docker compose down -v
