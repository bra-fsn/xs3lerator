services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=0
    volumes:
      - localstack-data:/var/lib/localstack
      - ./docker/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 5s
      timeout: 5s
      retries: 20

  xs3lerator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${XS3_PORT:-8888}:8080"
    environment:
      - RUST_LOG=xs3lerator=debug
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - XS3_S3_ENDPOINT_URL=http://localstack:4566
      - XS3_S3_FORCE_PATH_STYLE=true
      - XS3_S3_CONCURRENCY=4
      - XS3_HTTP_CONCURRENCY=4
      - XS3_MIN_CHUNK_SIZE=5MiB
      - XS3_ELASTICSEARCH_URL=http://elasticsearch:9200
      - XS3_ELASTICSEARCH_MANIFEST_INDEX=xs3_manifests
      - XS3_ELASTICSEARCH_REPLICAS=0
      - XS3_ELASTICSEARCH_SHARDS=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      localstack:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

volumes:
  localstack-data:
