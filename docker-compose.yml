services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=0
    volumes:
      - localstack-data:/var/lib/localstack
      - ./docker/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 5s
      timeout: 5s
      retries: 20

  # FUSE sidecar: mounts the LocalStack S3 test bucket at /data via mount-s3.
  # The mount is shared with xs3lerator through a bind-propagated volume so
  # xs3lerator can read/write S3 objects as ordinary files.
  mount-s3:
    build:
      context: ./docker
      dockerfile: Dockerfile.mount-s3
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    devices:
      - /dev/fuse
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - ./docker/mount-s3-entrypoint.sh:/entrypoint.sh:ro
      - type: bind
        source: ./.data
        target: /mnt/shared
        bind:
          propagation: rshared
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - MOUNT_S3_BUCKET=xs3lerator-test
      - MOUNT_S3_MOUNTPOINT=/mnt/shared/bucket
      - MOUNT_S3_ENDPOINT=http://localstack:4566
      - MOUNT_UID=65534
      - MOUNT_GID=65534
    depends_on:
      localstack:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ls /mnt/shared/bucket 2>/dev/null || mount | grep -q /mnt/shared/bucket"]
      interval: 3s
      timeout: 3s
      retries: 15
      start_period: 5s

  xs3lerator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${XS3_PORT:-8888}:8080"
    environment:
      - RUST_LOG=xs3lerator=debug
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - XS3_DATA_DIR=/mnt/shared/bucket
      - XS3_HTTP_CONCURRENCY=4
      - XS3_ELASTICSEARCH_URL=http://elasticsearch:9200
    volumes:
      - type: bind
        source: ./.data
        target: /mnt/shared
        bind:
          propagation: rshared
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      localstack:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      mount-s3:
        condition: service_healthy

volumes:
  localstack-data:
