services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=0
    volumes:
      - localstack-data:/var/lib/localstack
      - ./docker/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  foundationdb:
    image: foundationdb/foundationdb:7.3.63
    ports:
      - "4500:4500"
    volumes:
      - fdb-data:/var/fdb/data
    healthcheck:
      test: ["CMD", "fdbcli", "--exec", "status minimal"]
      interval: 5s
      timeout: 5s
      retries: 20

  xs3lerator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${XS3_PORT:-8888}:8080"
    environment:
      - RUST_LOG=xs3lerator=debug
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - XS3_S3_BUCKET=xs3lerator-test
      - XS3_S3_REGION=us-east-1
      - XS3_S3_ENDPOINT=http://localstack:4566
      - XS3_CACHE_DIR=/cache
      - XS3_HTTP_CONCURRENCY=4
      - XS3_CHUNK_SIZE=5m
      - XS3_FDB_CLUSTER_FILE=/var/fdb/fdb.cluster
    tmpfs:
      - /cache:size=1G
    volumes:
      - fdb-data:/var/fdb:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      localstack:
        condition: service_healthy
      foundationdb:
        condition: service_healthy

volumes:
  localstack-data:
  fdb-data:
